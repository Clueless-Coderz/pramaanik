global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "gnn-inference"
    static_configs:
      - targets: ["gnn-inference:8080"]
    metrics_path: "/metrics"

  - job_name: "zkml-prover"
    static_configs:
      - targets: ["zkml-prover:8081"]
    metrics_path: "/metrics"

  - job_name: "oracle-relayer"
    static_configs:
      - targets: ["oracle-relayer:8082"]
    metrics_path: "/metrics"

  - job_name: "besu"
    static_configs:
      - targets: ["besu:9545"]
    metrics_path: "/metrics"
