version: '3.8'

services:
  # ─── BLOCKCHAIN BASE LAYER ──────────────────────────────────────────────────
  besu:
    image: hyperledger/besu:latest
    ports:
      - "8545:8545"
      - "9545:9545"  # Prometheus metrics
    command: [
      "--network=dev",
      "--rpc-http-enabled",
      "--rpc-http-api=ETH,NET,WEB3,DEBUG,MINER,TXPOOL",
      "--host-allowlist=*",
      "--rpc-http-cors-origins=all",
      "--metrics-enabled",
      "--metrics-port=9545"
    ]
    volumes:
      - besu-data:/opt/besu/data

  # ─── OFF-CHAIN GNN & ZKML PIPELINE ──────────────────────────────────────────
  gnn-inference:
    build: 
      context: ./services/gnn
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ZKML_WORKER_URL=http://zkml-prover:8081
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=pramaanik123
    depends_on:
      - neo4j
      - redis

  zkml-prover:
    build:
      context: ./services/zkml
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PROOF_SLA_TIMEOUT=120
      - BATCH_SIZE=8
      - BATCH_WAIT_MS=5000
      - GPU_ENABLED=auto
    volumes:
      - zkml-data:/app/data
    depends_on:
      - redis

  # ─── ORACLE RELAYER ─────────────────────────────────────────────────────────
  oracle-relayer:
    build:
      context: ./services/oracle
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - GSTN_SANDBOX_URL=${GSTN_SANDBOX_URL:-}
      - GSTN_API_KEY=${GSTN_API_KEY:-}
      - NPCI_API_URL=${NPCI_API_URL:-}
      - NPCI_API_KEY=${NPCI_API_KEY:-}
      - NIC_GEOTAG_API_URL=${NIC_GEOTAG_API_URL:-}
    depends_on:
      - besu

  # ─── GRAPH DATABASE FOR ANOMALY DETECTION ───────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/pramaanik123
    volumes:
      - neo4j-data:/data

  # ─── REDIS (Job Queue + Proof Cache) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ─── ORACLES & PUBLISHERS ───────────────────────────────────────────────────
  anchor-publisher:
    build:
      context: ./services/anchor
      dockerfile: Dockerfile
    environment:
      - BESU_RPC_URL=http://besu:8545
      - POLYGON_AMOY_RPC_URL=${POLYGON_AMOY_RPC_URL}
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
      - PRIVATE_KEY=${PUBLISHER_PRIVATE_KEY}
    depends_on:
      - besu

  # ─── IPFS STORAGE ───────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/go-ipfs:latest
    ports:
      - "5001:5001"
      - "8083:8080"
    volumes:
      - ipfs-data:/data/ipfs

  # ─── FRONTEND NEXT.JS APPLICATION ───────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_RPC_URL=http://localhost:8545
    depends_on:
      - besu
      - gnn-inference

  # ─── OBSERVABILITY STACK (Gap #6) ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=pramaanik
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  besu-data:
  neo4j-data:
  zkml-data:
  ipfs-data:
  redis-data:
  prometheus-data:
  grafana-data:
