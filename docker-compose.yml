version: '3.8'

services:
  # ─── BLOCKCHAIN BASE LAYER ──────────────────────────────────────────────────
  besu:
    image: hyperledger/besu:latest
    ports:
      - "8545:8545"
    command: [
      "--network=dev",
      "--rpc-http-enabled",
      "--rpc-http-api=ETH,NET,WEB3,DEBUG,MINER,TXPOOL",
      "--host-allowlist=*",
      "--rpc-http-cors-origins=all"
    ]
    volumes:
      - besu-data:/opt/besu/data

  # ─── OFF-CHAIN GNN & ZKML PIPELINE ──────────────────────────────────────────
  gnn-inference:
    build: 
      context: ./services/gnn
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ZKML_WORKER_URL=http://zkml-prover:8081
    depends_on:
      - neo4j

  zkml-prover:
    build:
      context: ./services/zkml
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - zkml-data:/app/data

  # ─── GRAPH DATABASE FOR ANOMALY DETECTION ───────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/pramaanik123
    volumes:
      - neo4j-data:/data

  # ─── ORACLES & PUBLISHERS ───────────────────────────────────────────────────
  anchor-publisher:
    build:
      context: ./services/anchor
      dockerfile: Dockerfile
    environment:
      - BESU_RPC_URL=http://besu:8545
      - POLYGON_AMOY_RPC_URL=${POLYGON_AMOY_RPC_URL}
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL}
      - PRIVATE_KEY=${PUBLISHER_PRIVATE_KEY}
    depends_on:
      - besu

  # ─── IPFS STORAGE ───────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/go-ipfs:latest
    ports:
      - "5001:5001"
      - "8082:8080"
    volumes:
      - ipfs-data:/data/ipfs

  # ─── FRONTEND NEXT.JS APPLICATION ───────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_RPC_URL=http://localhost:8545
    depends_on:
      - besu
      - gnn-inference

volumes:
  besu-data:
  neo4j-data:
  zkml-data:
  ipfs-data:
