[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = true
fuzz = { runs = 10000 }

[profile.ci]
fuzz = { runs = 50000 }

[rpc_endpoints]
besu = "${BESU_RPC_URL}"
polygon_amoy = "${POLYGON_AMOY_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
